version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    # DO-3: default DB_* to the bundled postgres service and supply a dev
    # JWT_SECRET so a fresh clone runs `docker compose up` with no hand-made
    # .env. Real secrets (Resend, prod JWT secret) can still be supplied via the
    # optional ./backend/.env below.
    environment:
      NODE_ENV: development
      PORT: "5000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tms_db
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CLIENT_ORIGIN: http://localhost:5173
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tms_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
